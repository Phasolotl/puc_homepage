<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PUC Gallery</title>
</head>
<style>
  body{
    margin: 0;
    font-family: Inter, sans-serif;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background-color: #1E5AA8;
    color: white;
    box-shadow: 0 4px 10px;
  }
  nav h1 {
    font-size: 40px;
    letter-spacing: 1px;
    margin-right: 250px;
  }
  nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
  }
  nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
  nav ul li a:hover {
    color: goldenrod;
  }
  #puclogo {
    width: 150px;
    height: 150px;
    object-fit: cover;
  }
  section{
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      padding: 25px;
      gap: 25px;
  }
  section img{
      width: 425px;
      height: 425px;
      object-fit: cover;
      border: 2px solid black;
      border-radius: 10px;
      transition: transform 0.2s ease;
  }
  section img:hover{
      transform: scale(1.2);
  }
</style>
<body>
<nav>
    <img src="puc_logo.png" alt="" id="puclogo">
    <h1>Pannasastra University of Cambodia</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>
<section>
    <img src="images/gallery1.jpg" alt="">
    <img src="images/gallery2.jpg" alt="">
    <img src="images/gallery3.jpg" alt="">
    <img src="images/gallery4.jpg" alt="">
    <img src="images/gallery5.jpg" alt="">
    <img src="images/gallery6.jpg" alt="">
    <img src="images/uni.jpg" alt="">
    <img src="images/uni2.jpg" alt="">
    <img src="images/uni3.jpg" alt="">
    <img src="images/uni4.jpg" alt="">
    <img src="images/uni5.jpg" alt="">
    <img src="images/uni6.jpg" alt="">
</section>
</body>
</html>
